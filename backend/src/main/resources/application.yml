spring:
  application:
    name: crm-backend
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  session:
    store-type: redis
    redis:
      repository-type: indexed
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  minio:
    endpoint: ${MINIO_ENDPOINT}
    bucket: ${MINIO_BUCKET}
    access-key: ${MINIO_APP_ACCESS_KEY}
    secret-key: ${MINIO_APP_SECRET_KEY}
