spring:
  application:
    name: crm-backend
  datasource:
    url: ${DB_URL}
    username: crm_app
    password: ${CRM_APP_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    url: ${DB_URL}
    user: ${POSTGRES_MIGRATION_USER}
    password: ${POSTGRES_MIGRATION_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  session:
    store-type: redis
    redis:
      repository-type: indexed
      # Versioned namespace intentionally invalidates sessions after incompatible deployments.
      namespace: ${SESSION_REDIS_NAMESPACE:crm:session:v1}
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  # Forwarded headers are trusted because Compose keeps the backend behind the internal frontend proxy.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:true}
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    csrf-cookie-secure: ${CSRF_COOKIE_SECURE:true}
    csrf-cookie-same-site: ${CSRF_COOKIE_SAME_SITE:Lax}
    session-generation-namespace: ${SESSION_SECURITY_NAMESPACE:crm:security:v1:generation}
  minio:
    endpoint: ${MINIO_ENDPOINT}
    bucket: ${MINIO_BUCKET}
    access-key: ${MINIO_APP_ACCESS_KEY}
    secret-key: ${MINIO_APP_SECRET_KEY}
