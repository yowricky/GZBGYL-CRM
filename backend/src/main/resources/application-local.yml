spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    username: crm_app
    password: ${CRM_APP_PASSWORD:CHANGE-ME-UNSAFE-CRM-APP}
  flyway:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/crm}
    user: ${POSTGRES_MIGRATION_USER:crm_migration}
    password: ${POSTGRES_MIGRATION_PASSWORD:CHANGE-ME-UNSAFE-POSTGRES-MIGRATION}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:CHANGE-ME-UNSAFE-REDIS}

server:
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:false}

app:
  security:
    csrf-cookie-secure: false
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    bucket: ${MINIO_BUCKET:crm-attachments}
    access-key: ${MINIO_APP_ACCESS_KEY:crm-local-app}
    secret-key: ${MINIO_APP_SECRET_KEY:CHANGE-ME-UNSAFE-MINIO-APP}
