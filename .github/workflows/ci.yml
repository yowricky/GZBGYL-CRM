name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Enable Corepack
        run: corepack enable

      - name: Verify backend
        working-directory: backend
        run: mvn -B verify

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Test frontend
        working-directory: frontend
        run: pnpm test:run

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Validate compose
        run: docker compose config --quiet

      - name: Start composed stack
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8081/ >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          exit 1

      - name: Run login smoke test
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8081
        run: pnpm e2e --project=chromium

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore

      - name: Stop composed stack
        if: always()
        run: docker compose down -v
