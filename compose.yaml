name: crm

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_MIGRATION_USER:?Set POSTGRES_MIGRATION_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD:?Set POSTGRES_MIGRATION_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:17-alpine
    entrypoint: ["/bin/sh", "/scripts/init-runtime-role.sh"]
    environment:
      PGHOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_MIGRATION_USER:?Set POSTGRES_MIGRATION_USER}
      PGPASSWORD: ${POSTGRES_MIGRATION_PASSWORD:?Set POSTGRES_MIGRATION_PASSWORD}
      CRM_APP_PASSWORD: ${CRM_APP_PASSWORD:?Set CRM_APP_PASSWORD}
    volumes:
      - ./infra/postgres/init-runtime-role.sh:/scripts/init-runtime-role.sh:ro
    networks: [private]
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks: [private]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        while IFS= read -r line || [ -n "$${line}" ]; do
          rendered=$${line//__BUCKET__/$${MINIO_BUCKET}}
          printf '%s\n' "$${rendered}"
        done < /config/attachment-policy.json > /tmp/attachment-policy.json
        mc admin user add local "$${MINIO_APP_ACCESS_KEY}" "$${MINIO_APP_SECRET_KEY}"
        mc admin policy create local crm-attachment-access /tmp/attachment-policy.json
        mc admin policy attach local crm-attachment-access --user "$${MINIO_APP_ACCESS_KEY}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:?Set MINIO_BUCKET}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:?Set MINIO_APP_ACCESS_KEY}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:?Set MINIO_APP_SECRET_KEY}
    volumes:
      - ./infra/minio/attachment-policy.json:/config/attachment-policy.json:ro
    networks: [private]
    depends_on:
      minio:
        condition: service_healthy

  backend:
    profiles: ["application"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}
      CRM_APP_PASSWORD: ${CRM_APP_PASSWORD:?Set CRM_APP_PASSWORD}
      POSTGRES_MIGRATION_USER: ${POSTGRES_MIGRATION_USER:?Set POSTGRES_MIGRATION_USER}
      POSTGRES_MIGRATION_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD:?Set POSTGRES_MIGRATION_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:?Set SESSION_COOKIE_SECURE}
      SESSION_COOKIE_HTTP_ONLY: ${SESSION_COOKIE_HTTP_ONLY:?Set SESSION_COOKIE_HTTP_ONLY}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:?Set SESSION_COOKIE_SAME_SITE}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:?Set CSRF_COOKIE_SECURE}
      CSRF_COOKIE_SAME_SITE: ${CSRF_COOKIE_SAME_SITE:?Set CSRF_COOKIE_SAME_SITE}
      SESSION_REDIS_NAMESPACE: ${SESSION_REDIS_NAMESPACE:-crm:session:v1}
      SESSION_SECURITY_NAMESPACE: ${SESSION_SECURITY_NAMESPACE:-crm:security:v1:generation}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:?Set MINIO_BUCKET}
      MINIO_APP_ACCESS_KEY: ${MINIO_APP_ACCESS_KEY:?Set MINIO_APP_ACCESS_KEY}
      MINIO_APP_SECRET_KEY: ${MINIO_APP_SECRET_KEY:?Set MINIO_APP_SECRET_KEY}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD}
    networks: [private]
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    profiles: ["application"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks: [private]
    depends_on:
      backend:
        condition: service_healthy

networks:
  private:
    internal: true

volumes:
  postgres-data:
  redis-data:
  minio-data:
